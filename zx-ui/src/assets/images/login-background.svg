<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <!-- 白色简约背景 -->
  <rect width="1920" height="1080" fill="#ffffff"/>

  <!-- 极简装饰线条（浅灰色，几乎不可见） -->
  <g opacity="0.03">
    <!-- 水平线条 -->
    <line x1="0" y1="200" x2="1920" y2="200" stroke="#667eea" stroke-width="1"/>
    <line x1="0" y1="400" x2="1920" y2="400" stroke="#667eea" stroke-width="1"/>
    <line x1="0" y1="600" x2="1920" y2="600" stroke="#667eea" stroke-width="1"/>
    <line x1="0" y1="800" x2="1920" y2="800" stroke="#667eea" stroke-width="1"/>
    <line x1="0" y1="1000" x2="1920" y2="1000" stroke="#667eea" stroke-width="1"/>

    <!-- 垂直线条 -->
    <line x1="300" y1="0" x2="300" y2="1080" stroke="#667eea" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="1080" stroke="#667eea" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="1080" stroke="#667eea" stroke-width="1"/>
    <line x1="1200" y1="0" x2="1200" y2="1080" stroke="#667eea" stroke-width="1"/>
    <line x1="1500" y1="0" x2="1500" y2="1080" stroke="#667eea" stroke-width="1"/>
    <line x1="1800" y1="0" x2="1800" y2="1080" stroke="#667eea" stroke-width="1"/>
  </g>

  <!-- 极简圆形装饰（非常淡） -->
  <circle cx="200" cy="200" r="80" fill="none" stroke="#667eea" stroke-width="1" opacity="0.02"/>
  <circle cx="1720" cy="880" r="120" fill="none" stroke="#667eea" stroke-width="1" opacity="0.02"/>
  <circle cx="1600" cy="200" r="60" fill="none" stroke="#667eea" stroke-width="1" opacity="0.02"/>
</svg>
